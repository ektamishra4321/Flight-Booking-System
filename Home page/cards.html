<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.card:hover {
  box-shadow: 10px 10px 10px 10px rgba(40,40,40,40);
  shadow-color:yellow
}

img {
  border-radius: 5px 5px 0 0;
}

* {
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
}

/* Float four columns side by side */
.column {
  float: left;
  width: 25%;
  padding: 0 10px;
}

/* Remove extra left and right margins, due to padding */
.row {margin: 0 -5px;}

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}

/* Responsive columns */
@media screen and (max-width: 600px) {
  .column {
    width: 100%;
    display: block;
    margin-bottom: 20px;
  }
}

/* Style the counter cards */
.card {
  box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
  padding: 16px;
  text-align: center;
  background-color: #FFFF00;
}
</style>
</head>
<body>

<h2><b><font style="ariel" size="18" color="red">FLY WITH THE BEST</font></b></h2>
<p></p>

<div class="row">
  <div class="column">
<div class="card">
  <img src="feedback.jpg" alt="Avatar" style="width:90%">
  <div class="container">
    <h4><b>Feedback</b></h4> 
    <p>Give your feedback</p> 
  </div>
</div>
</div>


 <div class="column">
<div class="card">
  <img src="travel.jpg" alt="Avatar" style="width:100%">
  <div class="container">
    <h4><b>Travel requirements</b></h4> 
    <p>Click here</p> 
  </div>
</div>
</div>
 
  <div class="column">
<div class="card">
  <img src="news.jpg" alt="Avatar" style="width:100%">
  <div class="container">
    <h4><b>Latest news</b></h4> 
    <p>Get the latest news of the airlines</p> 
  </div>
</div>
</div>

  <div class="column">
<div class="card">
  <img src="services.jpg" alt="Avatar" style="width:105%">
  <div class="container">
    <h4><bServices</b></h4> 
    <p>Know more about the services we offer</p> 
  </div>
</div>
</div>


</body>
</html>
