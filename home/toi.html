<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

.container {
  position: relative;
  text-align: center;
  color: white;
}

.centered {
  position: absolute;
  font-size: 150px;
  color: black;
  top: 80%;
  left: 20%;
  transform: translate(-20%,-10%);
  animation: glow 1s ease-in-out infinite alternate
}

.glow {
  font-size: 80px;
  color: #fff;
  text-align: center;
  animation: glow 1s ease-in-out infinite alternate;
}

@-webkit-keyframes glow 
{
  from {
    text-shadow: 0 0 10px black, 0 0 20px black, 0 0 30px black, 0 0 40px black, 0 0 50px black, 0 0 60px black, 0 0 70px black;
  }
  
  to {
    text-shadow: 0 0 20px blue, 0 0 30px blue, 0 0 40px blue, 0 0 50px blue, 0 0 60px blue, 0 0 70px blue, 0 0 80px blue;
  }
}




.container {
  padding: 16px;
}

.myVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 70%;
  z-index: -5;
}
.topnav {
  body.margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
  background-color: #333;
  position: absolute;
  min-width: 100%;
  
  
}

.topnav a {
  float: left;
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
}

.topnav a:hover {
  background-color: #ddd;
  color: black;
}

.topnav a.active {
  background-color: #04AA6D;
  color: white;
}

.parallax1{
  /* The image used */
  background-image: url("homeimg.jpg");

  /* Set a specific height */
  min-height: 500px; 

  /* Create the parallax scrolling effect */
  background-attachment: fixed;
  background-position:center;
  background-repeat: no-repeat;
  background-size: cover;
  position:relative;
}


</style>
</head>


<body>

<div>
<div class="container">
<body>
<video autoplay muted loop class="myVideo" source src="video.mp4" type="video/mp4">
</video>

<div class="centered","glow">Aerofly Airlines</div>
</div>
</body>
</div>

<div>

<div class="topnav">
  <a class="active" href="#home">Home</a>
  <a href="#flight">Flight time table</a>
  <a href="#payment">Payment and offers</a>
  <a href="#booking">Seat booking</a>
  <a href="#bags">Baggage</a>
  <a href="#airport">Airport and hotel locations</a>
  <a href="#contact">Contact us</a>
  
</div>
</div>

<div>

</div>
</div>

</body>
</html>
